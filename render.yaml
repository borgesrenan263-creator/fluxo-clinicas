services:
  - type: web
    name: fluxo-clinicas
    env: ruby
    plan: free
    buildCommand: bundle install && ruby db/setup.rb && ruby db/seeds.rb
    startCommand: bundle exec rackup config.ru -p $PORT -o 0.0.0.0
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: WHATSAPP_MODE
        value: manual
      - key: DATABASE_URL
        fromDatabase:
          name: fluxo-clinicas-db
          property: connectionString

databases:
  - name: fluxo-clinicas-db
    plan: free
